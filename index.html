      },
      {
        "@type": "WebSite",
        "@id": "https://www.gomarix.in/#website",
        "url": "https://www.gomarix.in/",
        "name": "Gomarix",
        "publisher": { "@id": "https://www.gomarix.in/#organization" },
        "inLanguage": "en-IN"
      },
      {
        "@type": "Service",
        "name": "Software, AI, SaaS & Data Platform Development",
        "serviceType": ["Software development", "AI solutions", "Web and mobile platforms", "SaaS and AI tools", "Automation software", "Data platforms"],
        "provider": { "@id": "https://www.gomarix.in/#organization" },
        "areaServed": { "@type": "Country", "name": "India" }
      },
      {
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How long does a typical engagement take?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Pilots and MVPs run 2–4 weeks. Products (SaaS, AI tools, web/mobile platforms) run 6–12 weeks. Platform engagements (data platforms, multi-tenant SaaS, enterprise rollouts) run 3 months and up. After discovery you get a written, week-by-week timeline before any work begins."
            }
          },
          {
            "@type": "Question",
            "name": "How does pricing and payment work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Every engagement is custom-scoped and fixed-quote, with milestone billing — typically 30% to start, 40% at mid-build, and 30% on delivery. Long-running platforms convert to a monthly retainer. NGOs and digital-inclusion projects get a discounted rate."
            }
          },
          {
            "@type": "Question",
            "name": "Which sectors does Gomarix focus on?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Our focus is education (schools, colleges, EdTech), healthcare (clinics, hospitals, telemedicine), and rural tech — including digital-inclusion projects. We also build for NGOs, government, AgriTech, logistics, FinTech, and early-stage SaaS startups."
            }
          },
          {
            "@type": "Question",
            "name": "Do I own the code, infrastructure, and data?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, 100%. On final payment, all source code, designs, database schemas, models, and IP belong to you. You get the GitHub repo, deployment credentials, infra-as-code, and full documentation. Cloud accounts are in your name from day one."
            }
          },
          {
            "@type": "Question",
            "name": "Do you offer a delivery guarantee?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Each milestone has a fixed deliverable, deadline, and acceptance criteria. If we miss a committed milestone for reasons within our control, we refund that milestone in full."
            }
          }
        ]
      }
    ]
  }

  <script>
    // Prevent flash of wrong theme
    (function() {
      try {
        var stored = localStorage.getItem('gomarix-theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
