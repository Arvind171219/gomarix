        "address": {
          "@type": "PostalAddress",
          "addressRegion": "Bihar",
          "addressCountry": "IN"
        },
        "contactPoint": [{
          "@type": "ContactPoint",
          "telephone": "+91-87896-94039",
          "contactType": "customer service",
          "areaServed": "IN",
          "availableLanguage": ["en", "hi"]
        }],
        "sameAs": []
      },
      {
        "@type": "LocalBusiness",
        "@id": "https://www.gomarix.in/#localbusiness",
        "name": "Gomarix",
        "image": "https://www.gomarix.in/gomarix_logo.png",
        "url": "https://www.gomarix.in/",
        "telephone": "+91-87896-94039",
        "priceRange": "₹₹",
        "address": {
          "@type": "PostalAddress",
          "addressRegion": "Bihar",
          "addressCountry": "IN"
        },
        "areaServed": [
          { "@type": "Country", "name": "India" },
          { "@type": "AdministrativeArea", "name": "Bihar" }
        ],
        "openingHoursSpecification": [{
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "10:00",
          "closes": "19:00"
        }]
      },
      {
        "@type": "WebSite",
        "@id": "https://www.gomarix.in/#website",
        "url": "https://www.gomarix.in/",
        "name": "Gomarix",
        "publisher": { "@id": "https://www.gomarix.in/#organization" },
        "inLanguage": "en-IN"
      },
      {
        "@type": "Service",
        "name": "Website Design & Development",
        "provider": { "@id": "https://www.gomarix.in/#organization" },
        "areaServed": { "@type": "Country", "name": "India" },
        "offers": {
          "@type": "AggregateOffer",
          "priceCurrency": "INR",
          "lowPrice": "4999",
          "highPrice": "24999",
          "offerCount": "3"
        }
      },
      {
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How long does a typical project take?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A static business website usually takes 1-2 weeks. Full-stack web applications take 4-8 weeks. Complex SaaS or AI platforms take 8-16 weeks. You get a detailed week-by-week timeline before we start."
            }
          },
          {
            "@type": "Question",
            "name": "How does pricing and payment work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Fixed quote after a free consultation — no hidden fees. Payment is split into milestones: 30% to start, 40% at mid-build, 30% on delivery. Plans start at ₹4,999."
            }
          },
          {
            "@type": "Question",
            "name": "Where is Gomarix located?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Gomarix is based in Bihar, India and serves clients across India and globally."
            }
          },
          {
            "@type": "Question",
            "name": "Do I own the code?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, 100%. Once final payment is made, all source code, designs, database schemas, and IP belong to you. You get the GitHub repo, deployment credentials, and full documentation."
            }
          },
          {
            "@type": "Question",
            "name": "Do you offer a money-back guarantee?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. If we miss our committed delivery date for reasons within our control, we refund your last milestone in full. If you're not satisfied with the design within the first 7 days, we issue a 100% refund minus any third-party costs (domain, hosting). Your risk is zero."
            }
          }
        ]
      }
    ]
  }
  </script>

  <script>
    // Prevent flash of wrong theme
    (function() {
      try {
        var stored = localStorage.getItem('gomarix-theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
